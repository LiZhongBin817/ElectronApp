name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Use HTTPS for GitHub git dependencies
        run: |
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global --add url."https://github.com/".insteadOf "git+https://git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "https://git@github.com:"
          git config --global --list

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installer
        run: pnpm run dist

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
          draft: false
          prerelease: false
