name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Use HTTPS for GitHub git dependencies
        run: |
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global --add url."https://github.com/".insteadOf "git+https://git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "https://git@github.com:"
          git config --global --list

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installer
        run: pnpm run dist

      - name: Verify updater assets
        shell: pwsh
        run: |
          $latestPath = "dist/latest.yml"
          if (!(Test-Path $latestPath)) {
            throw "dist/latest.yml 不存在，无法发布自动更新元数据。"
          }

          $pathLine = Get-Content $latestPath | Where-Object { $_ -match "^path:\s*(.+)$" } | Select-Object -First 1
          if (!$pathLine) {
            throw "latest.yml 中没有 path 字段。"
          }

          $assetName = ($pathLine -replace "^path:\s*", "").Trim()
          $assetPath = Join-Path "dist" $assetName
          if (!(Test-Path $assetPath)) {
            throw "latest.yml 指向的安装包不存在：$assetPath"
          }

          $blockMapPath = "$assetPath.blockmap"
          if (!(Test-Path $blockMapPath)) {
            throw "latest.yml 指向的 blockmap 不存在：$blockMapPath"
          }

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
          draft: false
          prerelease: false
