appId: com.lizb.electronapp
productName: 本地服务管理器

directories:
  output: dist

win:
  requestedExecutionLevel: requireAdministrator
  target:
    - target: nsis
      arch:
        - x64
  artifactName: local-service-manager-setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ${productName}

publish:
  provider: github
  owner: LiZhongBin817
  repo: ElectronApp
  releaseType: release
